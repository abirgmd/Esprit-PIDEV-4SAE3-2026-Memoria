apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: memoria
  labels:
    app: eureka-server
spec:
  replicas: 1 # Eureka : 1 seule instance (évite les conflits de registre)
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
      - name: eureka-server
        image: pidev/eureka:latest # image publiée par le pipeline CI
        ports:
        - containerPort: 8761
          name: http
        env:
        - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
          value: 'false' # Eureka ne s'enregistre pas chez lui-même
        - name: EUREKA_CLIENT_FETCH_REGISTRY
          value: 'false'
        readinessProbe: # K8s attend qu'Eureka soit prêt
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 40
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: memoria-registry
  namespace: memoria
  labels:
    app: eureka-server
spec:
  selector:
    app: eureka-server
  ports:
  - port: 8761
    targetPort: 8761
    nodePort: 30761
    protocol: TCP
    name: http
  type: NodePort
