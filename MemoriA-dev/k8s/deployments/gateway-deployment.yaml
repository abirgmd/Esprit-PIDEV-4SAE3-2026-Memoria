apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoria-gateway
  namespace: memoria
  labels:
    app: memoria-gateway
spec:
  replicas: 2 # 2 pods pour la haute disponibilité
  selector:
    matchLabels:
      app: memoria-gateway
  template:
    metadata:
      labels:
        app: memoria-gateway
    spec:
      containers:
      - name: memoria-gateway
        image: fatmaellouze03/memoria-gateway:latest
        ports:
        - containerPort: 8888
          name: http
        env:
        # K8s DNS interne : les services se trouvent par leur nom
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: 'http://eureka-server:8761/eureka/'
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 15
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
