version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: memoria-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Memoria_database_jasser
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - memoria-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: memoria-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --http-port=9090
    ports:
      - "9090:9090"
    networks:
      - memoria-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  memoria-backend:
    image: memoria-backend-jasser:latest
    container_name: memoria-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/Memoria_database_jasser?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:9090/realms/my-realm
    ports:
      - "8083:8082"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - memoria-network
    restart: on-failure

  api-gateway:
    image: api-gateway-jasser:latest
    container_name: memoria-gateway
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:9090/realms/my-realm
      BACKEND_URL: http://memoria-backend:8082
    ports:
      - "8080:8080"
    depends_on:
      - memoria-backend
    networks:
      - memoria-network
    restart: on-failure

networks:
  memoria-network:
    driver: bridge

volumes:
  mysql_data:
