apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoria-planning
  namespace: memoria
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memoria-planning
  template:
    metadata:
      labels:
        app: memoria-planning
    spec:
      containers:
      - name: memoria-planning
        image: fatmaellouze03/memoria-planning:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: memoria-planning
  namespace: memoria
spec:
  selector:
    app: memoria-planning
  ports:
  - port: 8081
    targetPort: 8081
    nodePort: 30081
  type: NodePort