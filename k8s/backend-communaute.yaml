apiVersion: v1
kind: Service
metadata:
  name: backend-communaute
spec:
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  selector:
    app: backend-communaute
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-communaute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-communaute
  template:
    metadata:
      labels:
        app: backend-communaute
    spec:
      containers:
        - name: backend-communaute
          image: abirgamoudi123/memoria-backend-communaute:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/memoria_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
