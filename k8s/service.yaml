apiVersion: v1
kind: Service
metadata:
  name: memoria-frontend
  namespace: memoria-prod
spec:
  type: NodePort
  selector:
    app: memoria-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: memoria-backend
  namespace: memoria-prod
spec:
  type: ClusterIP
  selector:
    app: memoria-backend
  ports:
  - port: 8082
    targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: memoria-prod
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
