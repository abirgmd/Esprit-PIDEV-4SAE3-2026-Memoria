apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoria-gateway
  namespace: pidev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memoria-gateway
  template:
    metadata:
      labels:
        app: memoria-gateway
    spec:
      containers:
        - name: memoria-gateway
          image: abirgamoudi123/memoria-gateway:latest
          ports:
            - containerPort: 8888
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: 'http://eureka-server:8761/eureka/'
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 120
            periodSeconds: 15

