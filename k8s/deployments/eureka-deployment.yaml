apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: pidev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: abirgamoudi123/memoria-registry:latest
          ports:
            - containerPort: 8761
          env:
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: 'false'
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: 'false'
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 90
            periodSeconds: 10
