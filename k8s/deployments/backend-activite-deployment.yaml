apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-activite
  namespace: pidev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-activite
  template:
    metadata:
      labels:
        app: backend-activite
    spec:
      containers:
        - name: backend-activite
          image: abirgamoudi123/memoria-backend-activite:latest
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: 'http://eureka-server:8761/eureka/'
            - name: SPRING_DATASOURCE_URL
              value: 'jdbc:mysql://mysql:3306/memoria_db?createDatabaseIfNotExist=true'
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
