# ── Test datasource: H2 in-memory (no MySQL required in CI) ─────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── JWT: use jwk-set-uri so the JwtDecoder is lazy (no Keycloak on startup) ─
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/my-realm/protocol/openid-connect/certs

# ── Mail: disable auto-configuration in tests ────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
