# ===============================
# APPLICATION
# ===============================
spring.application.name=memorIA-activite-service
server.port=8082

# ===============================
# MYSQL DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Memoria_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# OPTIONAL (Good Practice)
# ===============================
spring.jpa.open-in-view=false

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200

# ===============================
# EMAIL (configure with your SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Jasserchouat3@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=jasserchouat3@gmail.com

# ===============================
# DEFAULT ADMIN BOOTSTRAP
# ===============================
app.admin.email=admin@memoria.com
app.admin.password=Admin@123

# ===============================
# MULTIPART CONFIGURATION
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# EUREKA & ACTUATOR
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.endpoint.health.show-details=always

