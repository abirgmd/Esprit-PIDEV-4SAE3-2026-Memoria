spring:
  main:
    web-application-type: reactive
  application:
    name: memoria-gateway
  cloud:
    gateway:
      routes:
        - id: activite-service
          uri: lb://memorIA-activite-service
          predicates:
            - Path=/api/**

        - id: communaute-service
          uri: lb://MemorIA_backend
          predicates:
            - Path=/auth/**, /communities/**, /publications/**, /comments/**, /messages/**


server:
  port: 8888

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER:localhost}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

