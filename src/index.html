<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>MemorIAFrontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    window.global = window;
    window.process = {
      env: { DEBUG: undefined },
      version: '',
      nextTick: function(cb) { setTimeout(cb, 0); },
      on: function() {},
      once: function() {},
      off: function() {},
      emit: function() {},
      cwd: function() { return '/'; }
    };
    window.Buffer = window.Buffer || {
      isBuffer: function() { return false; },
      from: function() { return []; },
      alloc: function() { return []; }
    };
  </script>
</head>

<body>
  <div id="loading-indicator" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: white; z-index: 10000; font-family: 'Inter', sans-serif;">
    <div style="text-align: center;">
      <div style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #541A75; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 20px; color: #541A75; font-weight: 600;">Chargement de MemorIA...</p>
    </div>
  </div>
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <app-root></app-root>
</body>

</html>
