global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'memorIA-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: 
          - '192.168.56.10:8081' # Communauté
          - '192.168.56.10:8082' # Activité
          - '192.168.56.10:8888' # Gateway
