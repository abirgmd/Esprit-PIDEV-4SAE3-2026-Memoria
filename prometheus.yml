global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'memorIA-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: 
          - '192.168.56.10:30081' # Communauté (NodePort)
          - '192.168.56.10:30082' # Activité (NodePort)
          - '192.168.56.10:30088' # Gateway (NodePort)
