<div class="manage-page">
  <div class="manage-container">
    <button class="back-btn" (click)="goBack()">
      <i class="fas fa-arrow-left"></i> Retour
    </button>

    <div class="header">
      <h1><i class="fas fa-credit-card"></i> Mon Abonnement</h1>
    </div>

    <div class="loading" *ngIf="isLoading">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Chargement...</span>
    </div>

    <!-- Active Subscription -->
    <div class="subscription-card active" *ngIf="!isLoading && subscription?.active">
      <div class="status-badge active">
        <i class="fas fa-check-circle"></i> Actif
      </div>
      <div class="plan-info">
        <h2>{{ getPlanLabel(subscription.planType) }}</h2>
        <p class="period">Prochaine facturation : {{ formatDate(subscription.currentPeriodEnd) }}</p>
      </div>
      <div class="actions">
        <a class="receipt-btn" *ngIf="subscription.receiptUrl"
           href="http://localhost:8081/subscriptions/receipt/{{subscription.receiptUrl}}" target="_blank" rel="noopener">
          <i class="fas fa-file-invoice"></i> Télécharger le reçu
        </a>
        <button class="cancel-btn" (click)="cancelSubscription()" [disabled]="isCancelling">
          <span *ngIf="!isCancelling"><i class="fas fa-times-circle"></i> Annuler l'abonnement</span>
          <span *ngIf="isCancelling"><i class="fas fa-spinner fa-spin"></i> Annulation...</span>
        </button>
      </div>
    </div>

    <!-- No Subscription -->
    <div class="subscription-card inactive" *ngIf="!isLoading && !subscription?.active">
      <div class="status-badge inactive">
        <i class="fas fa-times-circle"></i> Inactif
      </div>
      <div class="plan-info">
        <h2>Aucun abonnement actif</h2>
        <p class="period">Souscrivez pour accéder à la messagerie et la communauté</p>
      </div>
      <div class="actions">
        <button class="subscribe-btn" (click)="goToSubscribe()">
          <i class="fas fa-rocket"></i> S'abonner
        </button>
      </div>
    </div>
  </div>
</div>
